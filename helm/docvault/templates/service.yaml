apiVersion: v1
kind: Service
metadata:
  name: docvault
  namespace: docvault
  labels:
    app: docvault
spec:
  selector:
    app: docvault
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
