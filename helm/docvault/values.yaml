# DocVault Helm Chart — default values
# Override with: helm install docvault ./helm/docvault -f my-values.yaml

image:
  repository: pmananthu/docvault
  tag: "2.0.0"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: NodePort
  port: 9091
  nodePort: 30091   # access at http://<NODE_IP>:30091

ingress:
  enabled: false
  host: "docvault.local"

# Host paths for persistent data (never touched by Helm upgrades)
dataPath:   "/DATA/AppData/docvault"
backupPath: "/BACKUP/AppData/docvault"

# Credentials are stored in a Kubernetes Secret named 'docvault-secret'.
# The secret is created by the CI workflow on first deploy using
# DOCVAULT_PASSWORD and DOCVAULT_SECRET_KEY GitHub repository secrets.
# It is never overwritten on subsequent deploys, preserving any DB-stored
# password changes made through the app's Settings page.

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

probes:
  initialDelaySeconds: 10
  periodSeconds: 30
